<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>업무 입력</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>업무 입력</h1>
    <nav>
      <a href="index.html">홈</a>
      <a href="daily.html">일간</a>
      <a href="weekly.html">주간</a>
      <a href="monthly.html">월간</a>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2>일간업무 입력</h2>

      <form id="workForm">
        <label>날짜</label>
        <input type="date" id="date" required />

        <label>담당자</label>
        <input type="text" id="manager" placeholder="예: 김세윤" required />

        <label>파트</label>
        <select id="part" required>
          <option value="">선택</option>
          <option>영상</option>
          <option>시각</option>
        </select>

        <label>프로젝트명</label>
        <input type="text" id="project" required />

        <label>업무구분</label>
        <select id="workType" required>
          <option value="">선택</option>
          <option>영상</option>
          <option>시각</option>
          <option>온라인</option>
          <option>오프라인</option>
          <option>카탈로그</option>
          <option>기타</option>
        </select>

        <label>요청부서</label>
        <select id="requestDept" required>
          <option value="">선택</option>
          <option>영업</option>
          <option>마케팅</option>
          <option>상품</option>
          <option>해외영업</option>
          <option>연구소</option>
          <option>CS</option>
          <option>기타</option>
        </select>

        <label>금일진행업무</label>
        <textarea id="todayWork" rows="5" required></textarea>

        <label>진행상태</label>
        <select id="status" required>
          <option value="">선택</option>
          <option>진행중</option>
          <option>검토중</option>
          <option>수정중</option>
          <option>완료</option>
          <option>보류</option>
          <option>자료대기</option>
          <option>지연</option>
        </select>

        <label>완료예정일</label>
        <input type="date" id="dueDate" />

        <label>특이사항</label>
        <textarea id="note" rows="3"></textarea>

        <label>산출물링크</label>
        <input type="url" id="outputLink" placeholder="https://..." />

        <label>작업건수</label>
        <input type="number" id="workCount" min="1" value="1" required />

        <button type="submit">저장하기</button>
      </form>

      <p id="message"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "여기에 네 SUPABASE URL";
    const SUPABASE_ANON_KEY = "여기에 네 ANON PUBLIC KEY";

    const supabase = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    function getISOWeek(dateString) {
      const date = new Date(dateString);
      const temp = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = temp.getUTCDay() || 7;
      temp.setUTCDate(temp.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(temp.getUTCFullYear(), 0, 1));
      return Math.ceil((((temp - yearStart) / 86400000) + 1) / 7);
    }

    document.getElementById("date").value = new Date().toISOString().slice(0, 10);

    document.getElementById("workForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const date = document.getElementById("date").value;
      const dateObj = new Date(date);

      const report = {
        "날짜": date,
        "담당자": document.getElementById("manager").value,
        "파트": document.getElementById("part").value,
        "프로젝트명": document.getElementById("project").value,
        "업무구분": document.getElementById("workType").value,
        "요청부서": document.getElementById("requestDept").value,
        "금일진행업무": document.getElementById("todayWork").value,
        "진행상태": document.getElementById("status").value,
        "완료예정일": document.getElementById("dueDate").value || null,
        "특이사항": document.getElementById("note").value,
        "산출물링크": document.getElementById("outputLink").value,
        "주차": getISOWeek(date),
        "월": dateObj.getMonth() + 1,
        "연도": dateObj.getFullYear(),
        "작업건수": Number(document.getElementById("workCount").value || 1)
      };

      const { error } = await supabase
        .from("work_reports")
        .insert([report]);

      const message = document.getElementById("message");

      if (error) {
        console.error(error);
        message.textContent = "저장 실패: " + error.message;
        message.style.color = "red";
        return;
      }

      message.textContent = "저장 완료!";
      message.style.color = "green";

      document.getElementById("workForm").reset();
      document.getElementById("date").value = new Date().toISOString().slice(0, 10);
      document.getElementById("workCount").value = 1;
    });
  </script>
</body>
</html>
