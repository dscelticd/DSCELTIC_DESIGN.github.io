<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>일간업무 입력</title>
</head>
<body>
  <h1>일간업무 입력</h1>

  <form id="reportForm">
    <input type="date" id="work_date" required />
    <input type="text" id="project_name" placeholder="프로젝트명" required />
    <textarea id="today_work" placeholder="금일진행업무" required></textarea>

    <select id="part">
      <option value="영상">영상</option>
      <option value="시각">시각</option>
    </select>

    <select id="status">
      <option value="진행중">진행중</option>
      <option value="검토중">검토중</option>
      <option value="수정중">수정중</option>
      <option value="완료">완료</option>
      <option value="보류">보류</option>
      <option value="자료대기">자료대기</option>
      <option value="지연">지연</option>
    </select>

    <button type="submit">저장</button>
  </form>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://ahfaulpvbhddqbcssuhd.supabase.co';
    const supabaseKey = 'sb_publishable_5VBkpWMI5AmnLCAEg68aGg_Rgq5M8UQ';

    const supabase = createClient(supabaseUrl, supabaseKey);

    document.getElementById('reportForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        work_date: document.getElementById('work_date').value,
        project_name: document.getElementById('project_name').value,
        today_work: document.getElementById('today_work').value,
        part: document.getElementById('part').value,
        status: document.getElementById('status').value
      };

      const { error } = await supabase
        .from('daily_reports')
        .insert([data]);

      if (error) {
        alert('저장 실패: ' + error.message);
      } else {
        alert('저장 완료');
        e.target.reset();
      }
    });
  </script>
</body>
</html>
