<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주간 대시보드</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>주간 대시보드</h1>
    <nav>
      <a href="index.html">홈</a>
      <a href="daily.html">일간</a>
      <a href="monthly.html">월간</a>
    </nav>
  </header>
  <main>
    <section class="card">
      <h2>주간 핵심 현황</h2>
      <div class="stats-grid">
        <div class="stat"><h3>업무 건수</h3><p id="week-total-work">0</p></div>
        <div class="stat"><h3>작업 건수</h3><p id="week-total-task">0</p></div>
        <div class="stat"><h3>완료</h3><p id="week-completed">0</p></div>
        <div class="stat"><h3>진행중</h3><p id="week-inprogress">0</p></div>
        <div class="stat"><h3>검토·수정</h3><p id="week-review">0</p></div>
        <div class="stat"><h3>지연·보류</h3><p id="week-delayed">0</p></div>
        <div class="stat"><h3>완료율</h3><p id="week-completion-rate">0%</p></div>
      </div>
    </section>
    <section class="card">
      <h2>프로젝트별 진행률</h2>
      <table>
        <thead><tr><th>프로젝트명</th><th>총 업무</th><th>완료</th><th>진행률</th></tr></thead>
        <tbody id="project-table-body"></tbody>
      </table>
    </section>
    <section class="card">
      <h2>요청 부서별 업무</h2>
      <table>
        <thead><tr><th>요청부서</th><th>총 업무</th><th>완료</th><th>완료율</th></tr></thead>
        <tbody id="dept-table-body"></tbody>
      </table>
    </section>
    <section class="card">
      <h2>파트별 현황</h2>
      <table>
        <thead><tr><th>파트</th><th>총 업무</th><th>완료</th></tr></thead>
        <tbody id="part-table-body"></tbody>
      </table>
    </section>
    <section class="card">
      <h2>업무 구분별 현황</h2>
      <table>
        <thead><tr><th>업무구분</th><th>총 업무</th><th>완료</th></tr></thead>
        <tbody id="type-table-body"></tbody>
      </table>
    </section>
    <section class="card">
      <h2>팀원별 현황</h2>
      <table>
        <thead><tr><th>담당자</th><th>총 업무</th><th>완료</th></tr></thead>
        <tbody id="member-table-body"></tbody>
      </table>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
